<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖片生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Apple Kaiti', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .options-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-item {
            display: flex;
            flex-direction: column;
        }

        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            background-color: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .result-image {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .download-btn {
            background: #667eea;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 10px;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .character-count {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .preset-prompts {
            margin: 20px 0;
            padding: 15px;
            background: #f0f5ff;
            border-radius: 8px;
        }

        .preset-prompts p {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preset-btn {
            background: white;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            .options-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 圖片生成器</h1>
        <p class="subtitle">使用 AI 創意生成獨特的圖片</p>

        <div class="error" id="errorMessage"></div>

        <div class="preset-prompts">
            <p>🎯 快速範本：</p>
            <div class="preset-buttons">
                <button class="preset-btn" onclick="setPreset('一隻可愛的貓咪在花園裡玩耍，風格為水彩插畫')">可愛貓咪</button>
                <button class="preset-btn" onclick="setPreset('美麗的日落海灘景色，柔和的粉紅色和橙色天空')">海灘日落</button>
                <button class="preset-btn" onclick="setPreset('一個現代化的辦公室設計，充滿自然光和植物')">現代辦公室</button>
                <button class="preset-btn" onclick="setPreset('一個夢幻的城堡在雲霧之中，魔幻風格')">魔幻城堡</button>
            </div>
        </div>

        <form id="imageForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="prompt">輸入你的創意描述：</label>
                <textarea 
                    id="prompt" 
                    placeholder="例如：一隻可愛的機器人在未來城市中散步..." 
                    required></textarea>
                <div class="character-count"><span id="charCount">0</span> / 1000 字</div>
            </div>

            <div class="options-group">
                <div class="option-item">
                    <label for="size">圖片尺寸：</label>
                    <select id="size">
                        <option value="1024x1024">正方形 (1024x1024)</option>
                        <option value="1024x1792">縱向 (1024x1792)</option>
                        <option value="1792x1024">橫向 (1792x1024)</option>
                    </select>
                </div>
                <div class="option-item">
                    <label for="quality">圖片品質：</label>
                    <select id="quality">
                        <option value="standard">標準品質 (快速)</option>
                        <option value="hd">高清品質 (較慢)</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="generate-btn" id="generateBtn">🎨 生成圖片</button>
                <button type="button" class="clear-btn" onclick="clearForm()">清除</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI 正在創作中... (這可能需要 10-60 秒)</p>
            </div>
        </form>

        <div class="result-section" id="resultSection">
            <h3>🖼️ 生成結果：</h3>
            <img id="resultImage" class="result-image" src="" alt="生成的圖片">
            <div>
                <button class="download-btn" onclick="downloadImage()">⬇️ 下載圖片</button>
            </div>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById('prompt');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultImage = document.getElementById('resultImage');
        const errorMessage = document.getElementById('errorMessage');
        const sizeSelect = document.getElementById('size');
        const qualitySelect = document.getElementById('quality');

        let currentImageData = null;

        // Update character count
        promptInput.addEventListener('input', () => {
            charCount.textContent = promptInput.value.length;
            if (promptInput.value.length > 1000) {
                promptInput.value = promptInput.value.substring(0, 1000);
                charCount.textContent = '1000';
            }
        });

        function setPreset(text) {
            promptInput.value = text;
            charCount.textContent = text.length;
            promptInput.focus();
        }

        function clearForm() {
            promptInput.value = '';
            charCount.textContent = '0';
            resultSection.classList.remove('active');
            errorMessage.classList.remove('active');
            currentImageData = null;
            promptInput.focus();
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Clear previous errors
            errorMessage.classList.remove('active');
            resultSection.classList.remove('active');

            // Show loading state
            generateBtn.disabled = true;
            loadingDiv.classList.add('active');

            try {
                const response = await fetch('/generate-image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        prompt: prompt,
                        size: sizeSelect.value,
                        quality: qualitySelect.value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resultImage.src = data.result;
                    currentImageData = data.result;
                    resultSection.classList.add('active');
                } else {
                    showError(data.error || '生成失敗，請重試');
                }
            } catch (error) {
                showError('網路連線錯誤，請檢查網路並重試');
                console.error('Error:', error);
            } finally {
                generateBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('active');
        }

        function downloadImage() {
            if (!currentImageData) return;

            const link = document.createElement('a');
            link.href = currentImageData;
            link.download = `ai-generated-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
