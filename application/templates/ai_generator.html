<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文字生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Apple Kaiti', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .result-text {
            color: #555;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .character-count {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .preset-prompts {
            margin: 20px 0;
            padding: 15px;
            background: #f0f5ff;
            border-radius: 8px;
        }

        .preset-prompts p {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preset-btn {
            background: white;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI 文字生成器</h1>
        <p class="subtitle">使用 AI 幫助你快速生成文字內容</p>

        <div class="error" id="errorMessage"></div>

        <div class="preset-prompts">
            <p>📋 快速範本：</p>
            <div class="preset-buttons">
                <button class="preset-btn" onclick="setPreset('請寫一篇關於人工智能未來的文章，大約200字')">AI 文章</button>
                <button class="preset-btn" onclick="setPreset('幫我寫一個產品描述，突出其優點和特色')">產品描述</button>
                <button class="preset-btn" onclick="setPreset('請寫一個創意的社群媒體貼文')">社群貼文</button>
                <button class="preset-btn" onclick="setPreset('幫我寫一封正式的商務電子郵件')">商務郵件</button>
            </div>
        </div>

        <form id="aiForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="prompt">輸入你的提示詞：</label>
                <textarea 
                    id="prompt" 
                    placeholder="例如：寫一篇關於...的文章" 
                    required></textarea>
                <div class="character-count"><span id="charCount">0</span> / 1000 字</div>
            </div>

            <div class="button-group">
                <button type="submit" class="generate-btn" id="generateBtn">生成文字</button>
                <button type="button" class="clear-btn" onclick="clearForm()">清除</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI 正在思考中...</p>
            </div>
        </form>

        <div class="result-section" id="resultSection">
            <h3>📝 生成結果：</h3>
            <div class="result-text" id="resultText"></div>
            <button class="copy-btn" onclick="copyToClipboard()">📋 複製文字</button>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById('prompt');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const loadingDiv = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultText = document.getElementById('resultText');
        const errorMessage = document.getElementById('errorMessage');

        // Update character count
        promptInput.addEventListener('input', () => {
            charCount.textContent = promptInput.value.length;
            if (promptInput.value.length > 1000) {
                promptInput.value = promptInput.value.substring(0, 1000);
                charCount.textContent = '1000';
            }
        });

        function setPreset(text) {
            promptInput.value = text;
            charCount.textContent = text.length;
            promptInput.focus();
        }

        function clearForm() {
            promptInput.value = '';
            charCount.textContent = '0';
            resultSection.classList.remove('active');
            errorMessage.classList.remove('active');
            promptInput.focus();
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Clear previous errors
            errorMessage.classList.remove('active');
            resultSection.classList.remove('active');

            // Show loading state
            generateBtn.disabled = true;
            loadingDiv.classList.add('active');

            try {
                const response = await fetch('/generate-text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    resultText.textContent = data.result;
                    resultSection.classList.add('active');
                } else {
                    showError(data.error || '生成失敗，請重試');
                }
            } catch (error) {
                showError('網路連線錯誤，請檢查網路並重試');
                console.error('Error:', error);
            } finally {
                generateBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('active');
        }

        function copyToClipboard() {
            const text = resultText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = event.target;
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ 已複製！';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                showError('複製失敗');
                console.error('Copy error:', error);
            });
        }
    </script>
</body>
</html>
